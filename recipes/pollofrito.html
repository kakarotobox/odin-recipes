<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollo Frito</title>
</head>
<body>
    <h1>Description</h1>
    <img src="../images/pollofrito.jpeg">
    <p>The pollo frito is a tasty dish that no-one can't say they don't like it.</p>
    <h2>Ingredients</h2>
    <ul>
        <li>1 pollo entero</li>
        <li>Sazones populares</li>
        <li>Aceite</li>
    </ul>
    <h2>Steps</h2>
    <ol>
        <li>Cortar y sazonar el pollo.</li>
        <li>Freir en aceite bien caliente las piezas de pollo.</li>
        <li>Comer y disfrutar.</li>
    </ol>
</body>
